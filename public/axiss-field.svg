<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Axiss Nav spatial field</title>
  <desc id="desc">A quiet layered navigation field with cool graphite surfaces and cyan route lines.</desc>
  <defs>
    <linearGradient id="bg" x1="90" x2="1110" y1="40" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#e8eef2" />
      <stop offset=".54" stop-color="#d8e2e7" />
      <stop offset="1" stop-color="#c8d6dd" />
    </linearGradient>
    <linearGradient id="route" x1="214" x2="1010" y1="617" y2="126" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38d6c8" />
      <stop offset=".47" stop-color="#2bb7d4" />
      <stop offset="1" stop-color="#76f7d4" />
    </linearGradient>
    <filter id="soft-shadow" width="140%" height="140%" x="-20%" y="-20%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" flood-color="#10222b" flood-opacity=".18" stdDeviation="28" />
    </filter>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)" rx="42" />
  <g opacity=".38">
    <path fill="none" stroke="#72838d" stroke-width="1" d="M100 140h1000M100 260h1000M100 380h1000M100 500h1000M100 620h1000M180 80v600M340 80v600M500 80v600M660 80v600M820 80v600M980 80v600" />
  </g>
  <g filter="url(#soft-shadow)">
    <path fill="#f7fbfc" fill-opacity=".74" stroke="#ffffff" stroke-opacity=".64" d="M190 232 443 122l226 98-256 120z" />
    <path fill="#f7fbfc" fill-opacity=".68" stroke="#ffffff" stroke-opacity=".54" d="M480 388 783 246l250 113-315 153z" />
    <path fill="#f7fbfc" fill-opacity=".62" stroke="#ffffff" stroke-opacity=".5" d="M138 530 388 412l256 111-266 128z" />
  </g>
  <path fill="none" stroke="url(#route)" stroke-linecap="round" stroke-linejoin="round" stroke-width="12" d="M222 586c98-118 167-154 263-133 110 24 154-45 202-139 49-95 138-141 285-121" />
  <g fill="#071d24">
    <circle cx="222" cy="586" r="18" />
    <circle cx="493" cy="454" r="16" />
    <circle cx="689" cy="310" r="16" />
    <circle cx="972" cy="193" r="18" />
  </g>
  <g fill="#38d6c8">
    <circle cx="222" cy="586" r="8" />
    <circle cx="493" cy="454" r="7" />
    <circle cx="689" cy="310" r="7" />
    <circle cx="972" cy="193" r="8" />
  </g>
  <g opacity=".7">
    <rect width="148" height="50" x="784" y="548" fill="#f7fbfc" fill-opacity=".7" rx="12" />
    <rect width="88" height="8" x="810" y="569" fill="#54717c" fill-opacity=".38" rx="4" />
    <rect width="98" height="50" x="292" y="166" fill="#f7fbfc" fill-opacity=".68" rx="12" />
    <rect width="52" height="8" x="315" y="187" fill="#54717c" fill-opacity=".38" rx="4" />
  </g>
</svg>
